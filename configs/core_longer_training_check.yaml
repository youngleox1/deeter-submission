# Core experiment, longer-training check: per the Limitations note ("500
# training steps is short... a longer-training check on the top 2-3 LRs
# per optimizer would be the natural follow-up"), this reruns only each
# optimizer's top-3 LRs (by mean best_val_loss in results/core/sweep_results.csv)
# for 6x the steps (3000 vs. 500), flat LR (no schedule -- isolates the
# step-count variable from the separate schedule ablation).

output_csv: results/core/longer_training_results.csv

data:
  type: text

model:
  max_seq_len: 128
  d_model: 128
  n_layers: 4
  n_heads: 4
  mlp_ratio: 4
  dropout: 0.0

train:
  batch_size: 64
  seq_len: 128
  max_steps: 3000
  eval_interval: 200
  eval_iters: 20
  divergence_threshold: 10000.0
  device: auto  # resolves to cuda if available, else cpu

sweep:
  seeds: [0, 1, 2]

  lr_grids:
    adamw:  [7.114e-3, 3.000e-3, 1.265e-3]
    sgd:    [3.000e-1, 1.265e-1, 5.335e-2]
    nero:   [3.000e-2, 1.265e-2, 7.114e-2]
    muon:   [2.000e-2, 8.434e-3, 4.743e-2]

  optimizer_kwargs:
    adamw:
      betas: [0.9, 0.95]
      weight_decay: 0.0
    sgd:
      momentum: 0.9
    nero:
      beta: 0.999
    muon:
      momentum: 0.95
      adamw_lr: 3.0e-3  # fixed fallback-branch LR, so sweeping 'lr' only varies the Muon branch
