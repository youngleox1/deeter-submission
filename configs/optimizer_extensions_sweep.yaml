# Exploration: LAMB and per-head Muon, compared against the AdamW and
# (whole-matrix) Muon baselines already analyzed in configs/core_sweep.yaml.
# Same model/data/train setup as the core sweep, so results are directly
# comparable to the already-committed core numbers.
#
# LR grid notes:
#  - adamw, muon: identical grids to core_sweep.yaml (same reference points).
#  - lamb: no strong prior for this small-scale (non-large-batch) setting,
#    where LAMB's usual large-batch motivation doesn't really apply -- reuse
#    AdamW's grid as the closest "Adam-family" analog. Noted as a guess, not
#    a tuned choice.
#  - muon_per_head: reuse muon's grid, since per-head orthogonalization is
#    expected to operate at a similar effective scale to whole-matrix.

output_csv: results/optimizer_extensions/sweep_results.csv

data:
  type: text

model:
  max_seq_len: 128
  d_model: 128
  n_layers: 4
  n_heads: 4
  mlp_ratio: 4
  dropout: 0.0

train:
  batch_size: 64
  seq_len: 128
  max_steps: 500
  eval_interval: 100
  eval_iters: 20
  divergence_threshold: 10000.0
  device: auto

sweep:
  seeds: [0, 1, 2]

  lr_grids:
    adamw:         [9.487e-5, 2.276e-4, 5.335e-4, 1.265e-3, 3.000e-3, 7.114e-3, 1.687e-2, 4.000e-2, 9.487e-2]
    muon:          [6.325e-4, 1.517e-3, 3.557e-3, 8.434e-3, 2.000e-2, 4.743e-2, 1.125e-1, 2.667e-1, 6.325e-1]
    lamb:          [9.487e-5, 2.276e-4, 5.335e-4, 1.265e-3, 3.000e-3, 7.114e-3, 1.687e-2, 4.000e-2, 9.487e-2]
    muon_per_head: [6.325e-4, 1.517e-3, 3.557e-3, 8.434e-3, 2.000e-2, 4.743e-2, 1.125e-1, 2.667e-1, 6.325e-1]

  optimizer_kwargs:
    adamw:
      betas: [0.9, 0.95]
      weight_decay: 0.0
    muon:
      momentum: 0.95
      adamw_lr: 3.0e-3
    lamb:
      betas: [0.9, 0.999]
      eps: 1.0e-6
      weight_decay: 0.0
    muon_per_head:
      momentum: 0.95
      adamw_lr: 3.0e-3
