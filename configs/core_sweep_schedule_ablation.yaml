# Core experiment, schedule ablation: identical to core_sweep.yaml (same
# model, same 500 steps, same LR grids/seeds) with cosine-warmup enabled.
# One variable changed at a time, per the Limitations note this ablation
# was written to resolve: "one additional ablation (single cosine+warmup
# config, same LR grid) rather than expanding the main grid."

output_csv: results/core/schedule_ablation_results.csv

data:
  type: text

model:
  max_seq_len: 128
  d_model: 128
  n_layers: 4
  n_heads: 4
  mlp_ratio: 4
  dropout: 0.0

train:
  batch_size: 64
  seq_len: 128
  max_steps: 500
  eval_interval: 100
  eval_iters: 20
  divergence_threshold: 10000.0
  device: auto  # resolves to cuda if available, else cpu
  use_cosine_schedule: true
  warmup_steps: 50    # 10% of max_steps
  min_lr_ratio: 0.1

sweep:
  seeds: [0, 1, 2]

  lr_grids:
    adamw:  [9.487e-5, 2.276e-4, 5.335e-4, 1.265e-3, 3.000e-3, 7.114e-3, 1.687e-2, 4.000e-2, 9.487e-2]
    sgd:    [9.487e-3, 2.276e-2, 5.335e-2, 1.265e-1, 3.000e-1, 7.114e-1, 1.687e+0, 4.000e+0, 9.487e+0]
    nero:   [9.487e-4, 2.276e-3, 5.335e-3, 1.265e-2, 3.000e-2, 7.114e-2, 1.687e-1, 4.000e-1, 9.487e-1]
    muon:   [6.325e-4, 1.517e-3, 3.557e-3, 8.434e-3, 2.000e-2, 4.743e-2, 1.125e-1, 2.667e-1, 6.325e-1]

  optimizer_kwargs:
    adamw:
      betas: [0.9, 0.95]
      weight_decay: 0.0
    sgd:
      momentum: 0.9
    nero:
      beta: 0.999
    muon:
      momentum: 0.95
      adamw_lr: 3.0e-3  # fixed fallback-branch LR, so sweeping 'lr' only varies the Muon branch
