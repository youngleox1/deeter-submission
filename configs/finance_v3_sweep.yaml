# v3: fixes the input-binarization confound identified in v2 -- feeds
# continuous (volatility-scaled) returns as real-valued input via a linear
# projection, while keeping v2's binary classification TARGET unchanged.
# Isolates whether it's the objective (v1->v2's change) or the input
# representation (the v2 confound) that matters more. Kept as a separate
# config/output from v1/v2 -- neither rerun, just superseded by a third,
# better-motivated attempt.

output_csv: results/finance/v3_sweep_results.csv

data:
  type: finance
  n_bins: 2
  val_fraction: 0.15
  vol_scale: true
  vol_window: 20
  continuous_input: true
  # tickers / date range use FinanceReturns defaults, see src/data/finance.py

model:
  max_seq_len: 64
  d_model: 128
  n_layers: 4
  n_heads: 4
  mlp_ratio: 4
  dropout: 0.0
  continuous_input: true

train:
  batch_size: 64
  seq_len: 64
  max_steps: 500
  eval_interval: 100
  eval_iters: 20
  divergence_threshold: 10000.0
  device: auto

sweep:
  seeds: [0, 1, 2]

  lr_grids:
    adamw: [9.487e-5, 2.276e-4, 5.335e-4, 1.265e-3, 3.000e-3, 7.114e-3, 1.687e-2, 4.000e-2, 9.487e-2]
    muon:  [6.325e-4, 1.517e-3, 3.557e-3, 8.434e-3, 2.000e-2, 4.743e-2, 1.125e-1, 2.667e-1, 6.325e-1]

  optimizer_kwargs:
    adamw:
      betas: [0.9, 0.95]
      weight_decay: 0.0
    muon:
      momentum: 0.95
      adamw_lr: 3.0e-3
